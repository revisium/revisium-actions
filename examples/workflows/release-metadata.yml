name: Release Metadata Example

on:
  workflow_dispatch:
    inputs:
      version:
        description: Target version without leading v.
        required: true

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: npm

      - run: npm ci

      - uses: revisium/revisium-actions/actions/apply-version-metadata@v0
        with:
          target-version: ${{ inputs.version }}
          version-files: |
            src/api/rest-api/openapi.json

      - uses: revisium/revisium-actions/actions/validate-version-metadata@v0
        with:
          target-version: ${{ inputs.version }}
          version-files: |
            src/api/rest-api/openapi.json

      - uses: revisium/revisium-actions/actions/check-prerelease-deps@v0
        with:
          target-version: ${{ inputs.version }}
