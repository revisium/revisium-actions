name: Release Train Dry Run

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release train transition.
        required: true
        type: choice
        options:
          - start-minor-alpha
          - start-major-alpha
          - start-minor-rc
          - start-major-rc
          - start-minor-stable
          - start-major-stable
          - alpha-bump
          - promote-rc
          - rc-bump
          - stable
          - patch
          - patch-alpha-start
          - patch-rc-start
permissions:
  actions: read
  contents: read

jobs:
  release-train:
    uses: revisium/revisium-actions/.github/workflows/release-train.yml@v0.3.1
    with:
      action: ${{ inputs.action }}
      dry_run: true
      node_version: 24.11.1
      install_command: npm ci
      validate_command: |
        npm run typecheck
        npm run build
