name: Validate Version Metadata
description: Validate package and optional JSON version metadata before publication.
inputs:
  target-version:
    description: Expected version, without a leading v.
    required: true
  version-files:
    description: Newline-separated JSON files whose version or info.version should be validated.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        TARGET_VERSION: ${{ inputs.target-version }}
        VERSION_FILES: ${{ inputs.version-files }}
      run: node "$GITHUB_ACTION_PATH/../../bin/validate-version-metadata.mjs"
