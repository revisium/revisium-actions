name: Apply Version Metadata
description: Update package and optional JSON version metadata files for a release.
inputs:
  target-version:
    description: Version to write, without a leading v.
    required: true
  version-files:
    description: Newline-separated JSON files whose version or info.version should be updated.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        TARGET_VERSION: ${{ inputs.target-version }}
        VERSION_FILES: ${{ inputs.version-files }}
      run: node "$GITHUB_ACTION_PATH/../../bin/apply-version-metadata.mjs"
