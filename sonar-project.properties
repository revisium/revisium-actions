# ====================
# Base Configuration
# ====================
sonar.projectKey=revisium_revisium-actions
sonar.organization=revisium

# ====================
# Source Settings
# ====================
sonar.sources=src,bin,scripts,actions,examples,docs,.github
sonar.tests=test
sonar.test.inclusions=**/*.test.js

# ====================
# Coverage Settings
# ====================
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ====================
# Standard Exclusions
# ====================
sonar.exclusions=node_modules/**,coverage/**,package-lock.json
sonar.coverage.exclusions=bin/**,scripts/**,actions/**,examples/**,docs/**,.github/**,test/**,**/*.test.js,eslint.config.js

# ====================
# Issue Ignore Rules
# ====================
sonar.issue.ignore.multicriteria=fp1

# FP: release instructions intentionally show placeholder paths and shell commands.
sonar.issue.ignore.multicriteria.fp1.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.fp1.resourceKey=docs/releasing.md
