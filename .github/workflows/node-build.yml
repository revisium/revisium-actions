name: Reusable Node Build

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version used for the build.
        required: false
        default: 24.11.1
        type: string
      working_directory:
        description: Directory that contains the package.json to build.
        required: false
        default: .
        type: string
      install_command:
        description: Command that installs repository dependencies.
        required: false
        default: npm ci
        type: string
      run_commands:
        description: Newline-separated shell commands to run after install.
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: bash -euo pipefail -c "$INSTALL_COMMAND"

      - name: Run build commands
        if: ${{ inputs.run_commands != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          RUN_COMMANDS: ${{ inputs.run_commands }}
        run: |
          set -euo pipefail

          while IFS= read -r command; do
            command="${command#"${command%%[![:space:]]*}"}"
            command="${command%"${command##*[![:space:]]}"}"

            if [[ -z "$command" || "${command#\#}" != "$command" ]]; then
              continue
            fi

            echo "Running: $command"
            bash -euo pipefail -c "$command"
          done <<< "$RUN_COMMANDS"
