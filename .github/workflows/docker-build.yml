name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name without registry prefix.
        required: false
        default: ''
        type: string
      context:
        description: Build context passed to docker/build-push-action.
        required: false
        default: .
        type: string
      dockerfile:
        description: Dockerfile path relative to the repository root.
        required: false
        default: Dockerfile
        type: string
      emit_latest_tag:
        description: Whether the newest stable tag should publish the latest tag.
        required: false
        default: true
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine latest stable Docker tag eligibility
        id: stable-tag
        shell: bash
        run: |
          set -euo pipefail

          IS_LATEST_STABLE=false
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            LATEST_STABLE_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
            if [[ "$GITHUB_REF_NAME" == "$LATEST_STABLE_TAG" ]]; then
              IS_LATEST_STABLE=true
            fi
          fi

          echo "is_latest_stable=$IS_LATEST_STABLE" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name || github.event.repository.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ inputs.emit_latest_tag && steps.stable-tag.outputs.is_latest_stable == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
